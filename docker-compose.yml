services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uptime
      POSTGRES_PASSWORD: uptime
      POSTGRES_DB: uptime_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptime -d uptime_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      UPTIME_DATABASE_URL: postgresql+asyncpg://uptime:uptime@db:5432/uptime_monitor
      UPTIME_DATABASE_URL_SYNC: postgresql://uptime:uptime@db:5432/uptime_monitor
    depends_on:
      db:
        condition: service_healthy
    cap_add:
      - NET_RAW  # Required for ICMP ping

volumes:
  pgdata:
